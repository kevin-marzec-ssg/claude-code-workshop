    // ─── Slide Components ──────────────────────────────────────────────────────

    // Canvas lives at the App level so it fills the entire card — see TitleBackground below.
    function TitleSlide({ s }) {
      const [typed, setTyped] = useState('');
      const [showSub, setShowSub] = useState(false);
      const [showMeta, setShowMeta] = useState(false);

      useEffect(() => {
        const title = s.title; // "Getting Started with Claude Code"
        // Mix of alts — some share "Getting " prefix (idx 8), some diverge earlier or start fresh
        const alts = [
          // Share "Getting " prefix (delete to 8, retype)
          "Getting Ready to Ship Faster!",
          "Getting Ready to Agentic Engineer!",
          "Getting Ready to Power Up!",
          "Getting Good at Delegation!",
          "Getting Ready to Build Something Real!",
          "Getting Comfortable with AI Agents!",
          "Getting Ready to Supercharge Your Team!",
          "Getting Dangerous with Claude Code!",
          "Getting Things Done 10x Faster!",
          "Getting Ahead of the Curve!",
          // Share "Get" prefix (delete to 3)
          "Get More Done in Less Time!",
          "Get Your Team Building with AI!",
          "Get Unstuck in Seconds!",
          // Share "G" prefix (delete to 1) — fully new direction
          "Go Faster. Build Smarter.",
          "Gone Are the Days of Slow Dev Cycles!",
          // Completely different — delete entire title, retype from scratch
          "AI-Powered Development is Here.",
          "Your Copilot is Ready. Are You?",
          "Agentic Engineering Starts Now.",
          "Ship More. Toil Less.",
          "Let Claude Code Handle the Boring Stuff.",
          "From Idea to PR in Minutes.",
          "The Future of Dev Velocity is Here.",
          "Build Like You Have a Team of 10.",
        ];

        let pos = 0;
        let state = 'typing';   // 'typing' | 'deleting' | 'pausing'
        let currentTarget = title;
        let nextTarget = title;
        let deleteTarget = 0;
        let pauseEnd = 0;
        let firstComplete = false;
        let isFirstType = true;
        let raf;

        const tick = () => {
          const now = Date.now();

          if (state === 'pausing') {
            if (now >= pauseEnd) {
              // Jump cursor to a random position and start deleting
              pos = Math.floor(currentTarget.length * 0.25 + Math.random() * currentTarget.length * 0.75);
              setTyped(currentTarget.slice(0, pos));

              // After the first pass, occasionally diverge into an alt phrase
              // ~75% chance of branching to an alt (giving real title only ~25% of display time)
              if (!isFirstType && currentTarget === title && Math.random() < 0.75) {
                const chosen = alts[Math.floor(Math.random() * alts.length)];
                nextTarget = chosen;
                // Find shared prefix length between title and chosen alt
                let shared = 0;
                while (shared < title.length && shared < chosen.length && title[shared] === chosen[shared]) shared++;
                // Delete down to the shared prefix (0 = full retype for completely different alts)
                deleteTarget = Math.max(0, shared);
              } else {
                nextTarget = title; // resolve back to real title
                deleteTarget = Math.max(1, Math.floor(Math.random() * pos * 0.55));
              }

              state = 'deleting';
            }
            raf = setTimeout(tick, 30);
            return;
          }

          if (state === 'deleting') {
            if (pos > deleteTarget) {
              pos--;
              setTyped(currentTarget.slice(0, pos));
              raf = setTimeout(tick, 30);
            } else {
              // Switch to next target and immediately start typing
              currentTarget = nextTarget;
              state = 'typing';
              raf = setTimeout(tick, 60);
            }
            return;
          }

          // state === 'typing'
          if (pos < currentTarget.length) {
            // Small chance of a mid-type correction on subsequent passes
            if (!isFirstType && pos > 6 && Math.random() < 0.015) {
              deleteTarget = Math.max(0, pos - Math.floor(Math.random() * 5 + 2));
              nextTarget = currentTarget;
              state = 'deleting';
              raf = setTimeout(tick, 40);
              return;
            }
            pos++;
            setTyped(currentTarget.slice(0, pos));
            raf = setTimeout(tick, isFirstType ? 44 : 36);
          } else {
            // Finished typing current target
            if (!firstComplete && currentTarget === title) {
              firstComplete = true;
              setTimeout(() => setShowSub(true), 400);
              setTimeout(() => setShowMeta(true), 900);
            }
            isFirstType = false;
            state = 'pausing';
            // Alts pause long enough to read; real title pauses a bit longer
            pauseEnd = now + (currentTarget === title
              ? 2500 + Math.random() * 2500
              : 1800 + Math.random() * 1200);
            // Always resolve back to the real title after an alt
            if (currentTarget !== title) nextTarget = title;
            raf = setTimeout(tick, 30);
          }
        };

        setTyped('');
        setShowSub(false);
        setShowMeta(false);
        raf = setTimeout(tick, 300);
        return () => clearTimeout(raf);
      }, [s.title]);

      const h1GlowShadow = [
        '0 0 6px rgba(255,255,255,0.95)',
        '0 0 18px rgba(217,119,6,0.85)',
        '0 0 40px rgba(217,119,6,0.55)',
        '0 0 90px rgba(217,119,6,0.25)',
      ].join(', ');

      return (
        <div style={{ textAlign: 'center', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <div className="glow-pulse" style={{ fontSize: 'clamp(52px, 6vw, 80px)', marginBottom: 16 }}>🤖</div>
          {/* Effect 1 + 2: glow shadow on h1, plus mirror reflection div below */}
          <div style={{ position: 'relative', marginBottom: 16 }}>

    function TitleBackground() {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const resize = () => {
          canvas.width = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;
        };
        resize();
        window.addEventListener('resize', resize);

        // ── Code rain — stream-based, authentic Matrix style ───────
        const fs = 18;
        // Half-width katakana (closest to what the film uses) + digits + symbols
        const rainChars = 'ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ012345789Z:・.=*+-<>'.split('');
        const rndChar = () => rainChars[Math.floor(Math.random() * rainChars.length)];
        let cols = Math.floor(canvas.width / fs);
        let streams = Array.from({ length: cols }, () => {
          const len = 8 + Math.floor(Math.random() * 20);
          return { y: Math.random() * -(len + 10), speed: 0.15 + Math.random() * 0.33, len, chars: Array.from({ length: len }, rndChar) };
        });

        // ── Particle graph ─────────────────────────────────────────
        // Node colours: mix of amber, cyan, violet, white
        const NODE_COLORS = [
          'rgba(217, 119,   6, 0.75)',  // amber
          'rgba( 56, 189, 248, 0.65)',  // cyan
          'rgba(167,  85, 247, 0.65)',  // violet
          'rgba(255, 255, 255, 0.50)',  // white
          'rgba( 52, 211, 153, 0.60)',  // emerald
        ];
        const EDGE_COLORS = [
          [217, 119,   6],   // amber
          [ 56, 189, 248],   // cyan
          [167,  85, 247],   // violet
          [255, 255, 255],   // white
        ];

        const NUM_P = 55;
        const CONNECT_DIST = 150;
        const pts = Array.from({ length: NUM_P }, (_, idx) => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          r: Math.random() * 2.2 + 1.0,
          color: NODE_COLORS[idx % NODE_COLORS.length],
          edgeColor: EDGE_COLORS[idx % EDGE_COLORS.length],
          pulse: Math.random() * Math.PI * 2, // phase offset for size pulse
        }));

        // ── Explosion particles & rings from collisions ────────────
        let sparks = [];  // { x, y, vx, vy, life, ch, white }
        let rings  = [];  // { x, y, radius, life }

        const spawnExplosion = (x, y) => {
          // Spark particles — matrix chars flying outward
          const count = 7 + Math.floor(Math.random() * 5);
          for (let k = 0; k < count; k++) {
            const angle = (Math.PI * 2 * k / count) + (Math.random() - 0.5) * 0.6;
            const spd   = 1.2 + Math.random() * 2.8;
            sparks.push({
              x, y,
              vx: Math.cos(angle) * spd,
              vy: Math.sin(angle) * spd - 1.0, // slight upward bias
              life: 0.8 + Math.random() * 0.4,
              ch: rndChar(),
              white: Math.random() < 0.35,
            });
          }
          // Expanding ring
          rings.push({ x, y, radius: 2, life: 1.0 });
        };

        let raf;
        const draw = () => {
          // Solid clear each frame — rain handles its own fading per character
          ctx.fillStyle = 'rgba(13, 17, 30, 0.92)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Collision bounds — recalculate each frame (text may resize)
          let titleBounds = null;
          const h1El = canvas.parentElement && canvas.parentElement.querySelector('[data-title-h1]');
          if (h1El) {
            const cr = canvas.getBoundingClientRect();
            const hr = h1El.getBoundingClientRect();
            titleBounds = { x: hr.left - cr.left, y: hr.top - cr.top, w: hr.width, h: hr.height };
          }

          // Code rain — stream-based with head/trail colouring
          ctx.font = `${fs}px monospace`;
          streams.forEach((s, col) => {
            // Stalled streams don't advance — they're mid-explosion
            if (!s.stall) s.y += s.speed;

            // Randomly mutate a trail character
            if (Math.random() < 0.08) s.chars[Math.floor(Math.random() * s.chars.length)] = rndChar();

            // Collision check
            const headPy = Math.floor(s.y) * fs;
            const headX  = col * fs + fs * 0.5; // centre of column
            if (titleBounds && !s.stall) {
              const inX = headX >= titleBounds.x && headX <= titleBounds.x + titleBounds.w;
              const inY = headPy >= titleBounds.y - fs * 0.5 && headPy <= titleBounds.y + titleBounds.h;
              if (inX && inY) {
                s.stall = 28;  // freeze stream for 28 frames
                spawnExplosion(headX, headPy);
              }
            }

            // Count down stall; reset stream when done
            if (s.stall > 0) {
              s.stall--;
              if (s.stall === 0) {
                s.y     = Math.random() * -15;
                s.speed = 0.15 + Math.random() * 0.33;
                s.len   = 8 + Math.floor(Math.random() * 20);
                s.chars = Array.from({ length: s.len }, rndChar);
                delete s.stall;
              }
            }

            s.chars.forEach((ch, i) => {
              const row = Math.floor(s.y) - i;
              const py  = row * fs;
              if (py < -fs || py > canvas.height) return;
              const x = col * fs;

              // During stall: head dims from bright white → dark; trail fades too
              if (s.stall > 0) {
                const t = s.stall / 28;
                if (i === 0) {
                  ctx.fillStyle = `rgba(255, 255, 255, ${t * 0.9})`;
                } else {
                  const fade = (1 - i / s.len) * t * 0.6;
                  ctx.fillStyle = `rgba(0, 200, 40, ${fade})`;
                }
              } else if (i === 0) {
                ctx.fillStyle = 'rgba(200, 255, 210, 0.95)';
              } else if (i === 1) {
                ctx.fillStyle = 'rgba(50, 255, 100, 0.90)';
              } else {
                const t = 1 - i / s.len;
                const g = Math.floor(60 + 160 * t);
                ctx.fillStyle = `rgba(0, ${g}, 20, ${0.15 + t * 0.65})`;
              }
              ctx.fillText(ch, x, py);
            });

            // Natural scroll-off reset
            if ((Math.floor(s.y) - s.len) * fs > canvas.height) {
              s.y     = Math.random() * -15;
              s.speed = 0.15 + Math.random() * 0.33;
              s.len   = 8 + Math.floor(Math.random() * 20);
              s.chars = Array.from({ length: s.len }, rndChar);
              delete s.stall;
            }
          });

          // ── Draw explosion rings ────────────────────────────────
          rings = rings.filter(r => r.life > 0);
          rings.forEach(r => {
            r.radius += 3.2;
            r.life   -= 0.045;
            const a = Math.max(0, r.life);
            ctx.beginPath();
            ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(100, 255, 120, ${a * 0.8})`;
            ctx.lineWidth   = 1.5 * a + 0.5;
            ctx.stroke();
          });

          // ── Draw spark particles ────────────────────────────────
          ctx.font = `${fs - 2}px monospace`;
          sparks = sparks.filter(sp => sp.life > 0);
          sparks.forEach(sp => {
            sp.x  += sp.vx;
            sp.y  += sp.vy;
            sp.vy += 0.13;  // gravity
            sp.vx *= 0.97;  // air drag
            sp.life -= 0.038;
            const a = Math.max(0, sp.life);
            if (sp.white) {
              ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
            } else {
              // Transitions from bright green → dim green as life fades
              const g = Math.floor(120 + 135 * a);
              ctx.fillStyle = `rgba(0, ${g}, 30, ${a})`;
            }
            ctx.fillText(sp.ch, sp.x, sp.y);
          });
          ctx.font = `${fs}px monospace`; // restore

          // Edges first (drawn under nodes)
          pts.forEach((p, i) => {
            for (let j = i + 1; j < pts.length; j++) {
              const q = pts[j];
              const d = Math.hypot(p.x - q.x, p.y - q.y);
              if (d < CONNECT_DIST) {
                const alpha = 0.22 * (1 - d / CONNECT_DIST);
                const [r, g, b] = p.edgeColor;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(q.x, q.y);
                ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
                ctx.lineWidth = 0.7;
                ctx.stroke();
              }
            }
          });

          // Nodes
          pts.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > canvas.width)  p.vx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            p.pulse += 0.025;

            const r = p.r + Math.sin(p.pulse) * 0.6;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
          });

          raf = requestAnimationFrame(draw);
        };
        draw();
        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', resize);
        };
      }, []);

      return <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', borderRadius: 16 }} />;
    }

          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 12, flexWrap: "wrap" }}>
            <span style={{ color: MUTED, fontSize: "clamp(13px, 1.1vw, 15px)" }}>Invoke with:</span>
            <code style={{ background: "#D9770622", color: ACCENT, border: `1px solid ${ACCENT}44`, borderRadius: 6, padding: "3px 14px", fontSize: "clamp(14px, 1.2vw, 17px)", fontWeight: 700 }}>{s.invoke}</code>
            <span style={{ color: MUTED, fontSize: "clamp(12px, 1vw, 14px)" }}>{s.args}</span>
          </div>

          <div style={{ background: "#0F172A", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "clamp(10px, 1vw, 14px)", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <div style={{ color: ACCENT, fontWeight: 700, fontSize: "clamp(12px, 1vw, 14px)" }}>LET CLAUDE BUILD YOUR SKILLS</div>
              <code style={{ background: "#D9770622", color: ACCENT, border: `1px solid ${ACCENT}44`, borderRadius: 6, padding: "2px 10px", fontSize: "clamp(11px, 0.95vw, 13px)", fontWeight: 700 }}>{s.creation.builtin}</code>
              <span style={{ color: MUTED, fontSize: "clamp(11px, 0.95vw, 13px)" }}>{s.creation.builtinDesc}</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "clamp(6px, 0.6vw, 8px)" }}>
              {s.creation.prompts.map((p, i) => (
                <div key={i} style={{ background: "#0a0f1a", borderRadius: 6, padding: "6px 10px", display: "flex", gap: 8 }}>
                  <span style={{ color: ACCENT, flexShrink: 0, fontStyle: "italic" }}>"</span>
                  <span style={{ color: TEXT, fontSize: "clamp(11px, 1vw, 13px)", lineHeight: 1.4 }}>{p}</span>
                  <span style={{ color: ACCENT, flexShrink: 0, fontStyle: "italic", alignSelf: "flex-end" }}>"</span>
                </div>
              ))}
            </div>
          </div>

          <TipBox>{s.tip}</TipBox>
        </div>
      );
    }

    function TipsSlide({ s }) {
      return (
        <div>
          <h2 style={{ color: "#fff", fontSize: "clamp(22px, 2.4vw, 34px)", margin: "0 0 20px", fontWeight: 800 }}>{s.title}</h2>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "clamp(8px, 0.8vw, 12px)" }}>
            {s.tips.map((t, i) => (
              <div key={i} style={{ background: "#0F172A", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "clamp(12px, 1.2vw, 18px)" }}>
                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: "clamp(18px, 1.7vw, 24px)" }}>{t.icon}</span>
                  <span style={{ color: ACCENT, fontWeight: 700, fontSize: "clamp(13px, 1.1vw, 16px)" }}>{t.title}</span>
                </div>
                <div style={{ color: TEXT, fontSize: "clamp(12px, 1.1vw, 15px)", lineHeight: 1.5 }}>{t.body}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function InstallSlide({ s }) {
      return (
        <div>
          <h2 style={{ color: "#fff", fontSize: "clamp(22px, 2.4vw, 34px)", margin: "0 0 6px", fontWeight: 800 }}>{s.title}</h2>
          <p style={{ color: MUTED, fontSize: "clamp(13px, 1.1vw, 16px)", margin: "0 0 18px" }}>{s.note}</p>
          <div style={{ display: "flex", flexDirection: "column", gap: "clamp(8px, 0.8vw, 12px)" }}>
            {s.steps.map((step, i) => (
              <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 16, background: "#0F172A", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "clamp(10px, 1vw, 16px)" }}>
                <div style={{ background: step.step ? ACCENT : "transparent", border: step.step ? "none" : `1px solid ${BORDER}`, borderRadius: "50%", minWidth: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: "clamp(12px, 1vw, 15px)", flexShrink: 0 }}>
                  {step.step || ""}
                </div>
                <div>
                  <div style={{ color: step.step ? "#fff" : MUTED, fontWeight: 600, fontSize: "clamp(13px, 1.2vw, 17px)", marginBottom: 6 }}>{step.label}</div>
                  {step.code && (
                    <code style={{ background: "#0a0f1a", color: ACCENT, padding: "5px 12px", borderRadius: 6, fontSize: "clamp(12px, 1.1vw, 15px)", display: "block" }}>
                      {step.code}
                    </code>
                  )}
                  {step.body && <div style={{ color: MUTED, fontSize: "clamp(12px, 1.1vw, 15px)" }}>{step.body}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function BuildSlide({ s }) {
      return (
        <div style={{ textAlign: "center" }}>
          <h2 style={{ color: "#fff", fontSize: "clamp(24px, 2.8vw, 40px)", margin: "0 0 10px", fontWeight: 800 }}>{s.title}</h2>
          <p style={{ color: ACCENT, fontSize: "clamp(16px, 1.7vw, 24px)", fontWeight: 700, margin: "0 0 28px" }}>{s.prompt}</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "clamp(8px, 0.8vw, 14px)", textAlign: "left", marginBottom: 24 }}>
            <div style={{ border: `1px solid ${BORDER}`, borderRadius: 12, padding: "clamp(14px, 1.4vw, 20px)" }}>
              <div style={{ color: ACCENT, fontWeight: 800, fontSize: "clamp(12px, 1.1vw, 15px)", marginBottom: 12 }}>PROJECT IDEAS</div>
              {s.ideas.map((idea, i) => (
                <div key={i} style={{ color: TEXT, fontSize: "clamp(13px, 1.2vw, 16px)", marginBottom: 8, display: "flex", gap: 10, lineHeight: 1.4 }}>
                  <span style={{ color: ACCENT, flexShrink: 0 }}>→</span>{idea}
                </div>
              ))}
            </div>
            <div style={{ border: `1px solid ${BORDER}`, borderRadius: 12, padding: "clamp(14px, 1.4vw, 20px)" }}>
              <div style={{ color: ACCENT, fontWeight: 800, fontSize: "clamp(12px, 1.1vw, 15px)", marginBottom: 12 }}>REMEMBER</div>
              {s.tips.map((tip, i) => (
                <div key={i} style={{ color: TEXT, fontSize: "clamp(13px, 1.2vw, 16px)", marginBottom: 8, display: "flex", gap: 10, lineHeight: 1.4 }}>
                  <span style={{ color: ACCENT, flexShrink: 0 }}>✓</span>{tip}
                </div>
              ))}
            </div>
          </div>
          <Tag>Facilitators are here to help — just ask!</Tag>
        </div>
      );
    }

    function SlideContent({ slide }) {
      if (slide.type === "title")         return <TitleSlide s={slide} />;
      if (slide.type === "agenda")        return <AgendaSlide s={slide} />;
      if (slide.type === "what")          return <WhatSlide s={slide} />;
      if (slide.type === "concept")       return <ConceptSlide s={slide} />;
      if (slide.type === "context-deep")  return <ContextDeepSlide s={slide} />;
      if (slide.type === "subagents-howto") return <SubagentsHowtoSlide s={slide} />;
      if (slide.type === "custom-skills") return <CustomSkillsSlide s={slide} />;
      if (slide.type === "tips")          return <TipsSlide s={slide} />;
      if (slide.type === "install")       return <InstallSlide s={slide} />;
      if (slide.type === "buildtime")     return <BuildSlide s={slide} />;
      return null;
    }

    // ─── Resources View ────────────────────────────────────────────────────────

    function ResourcesView() {
      return (
        <div style={{ width: "100%", maxWidth: "min(95vw, 1200px)" }}>
          <h2 style={{ color: "#fff", fontSize: "clamp(22px, 2.4vw, 32px)", fontWeight: 800, margin: "0 0 24px", textAlign: "center" }}>
            Useful Links & Resources
          </h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: "clamp(12px, 1.2vw, 20px)" }}>
            {resources.map((section, si) => (
              <div key={si} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 14, padding: "clamp(16px, 1.6vw, 24px)" }}>
                <div style={{ color: ACCENT, fontWeight: 800, fontSize: "clamp(12px, 1.1vw, 15px)", letterSpacing: 1, marginBottom: 14 }}>
                  {section.category.toUpperCase()}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {section.links.map((link, li) => (
                    <a key={li} href={link.url} target="_blank" rel="noreferrer" style={{
                      display: "block",
                      background: "#0F172A",
                      border: `1px solid ${BORDER}`,
                      borderRadius: 8,
                      padding: "clamp(10px, 1vw, 14px)",
                      textDecoration: "none",
                      transition: "border-color 0.15s",
                    }}
                      onMouseEnter={e => e.currentTarget.style.borderColor = ACCENT}
                      onMouseLeave={e => e.currentTarget.style.borderColor = BORDER}
                    >
                      <div style={{ color: "#fff", fontWeight: 600, fontSize: "clamp(13px, 1.2vw, 16px)", marginBottom: 3 }}>{link.label}</div>
                      <div style={{ color: MUTED, fontSize: "clamp(11px, 1vw, 13px)" }}>{link.desc}</div>
                    </a>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <p style={{ color: MUTED, textAlign: "center", marginTop: 20, fontSize: "clamp(12px, 1vw, 14px)" }}>
            Use arrow keys or the Slides tab to return to the presentation
          </p>
        </div>
      );
    }

    // ─── Cowork View ───────────────────────────────────────────────────────────

    function CoworkView() {
      const sec = (title) => (
        <div style={{ color: ACCENT, fontWeight: 800, fontSize: "clamp(11px, 1vw, 14px)", letterSpacing: 1, marginBottom: 12 }}>
          {title}
        </div>
      );

      const card = (children, extra = {}) => (
        <div style={{ background: "#0F172A", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "clamp(12px, 1.2vw, 18px)", ...extra }}>
          {children}
        </div>
      );

      const vs = [
        { label: "Audience",    code: "Developers",            work: "Knowledge workers (sales, legal, marketing, finance…)" },
        { label: "Style",       code: "Interactive — you approve each change", work: "Autonomous — set the goal, step away" },
        { label: "Environment", code: "Your local machine",    work: "Cloud VM managed by Anthropic" },
        { label: "Focus",       code: "Code editing, git, CI/CD", work: "Office tasks, research, drafting, data" },
      ];

      const plugins = [
        { icon: "💼", label: "Sales",            desc: "Prospect research, call prep, outreach drafts" },
        { icon: "📣", label: "Marketing",        desc: "Content planning, copy drafts, campaign briefs" },
        { icon: "⚖️", label: "Legal",            desc: "Contract review, compliance checks, policy summaries" },
        { icon: "💰", label: "Finance",          desc: "Journal entries, reconciliation, financial statements" },
        { icon: "🗺️", label: "Product",          desc: "Specs, roadmap planning, PRD drafts" },
        { icon: "📊", label: "Data",             desc: "Query writing, dataset analysis, visualisations" },
        { icon: "🎧", label: "Customer Support", desc: "Ticket triage, response drafts, escalation routing" },
        { icon: "🔍", label: "Enterprise Search",desc: "Search across email, chat, docs, and wikis" },
      ];

      return (
        <div style={{ width: "100%", maxWidth: "min(95vw, 1200px)" }}>
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <h2 style={{ color: "#fff", fontSize: "clamp(22px, 2.4vw, 34px)", fontWeight: 800, margin: "0 0 6px" }}>
              Claude Cowork
            </h2>
            <p style={{ color: ACCENT, fontWeight: 700, fontSize: "clamp(14px, 1.3vw, 18px)", margin: "0 0 4px" }}>
              An autonomous background agent for knowledge work — not just code.
            </p>
            <p style={{ color: MUTED, fontSize: "clamp(13px, 1.1vw, 16px)" }}>
              Describe the outcome. Claude works in a cloud VM and keeps you informed. You step away.
            </p>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "clamp(10px, 1vw, 16px)", marginBottom: "clamp(10px, 1vw, 16px)" }}>

            {/* How to get it */}
            {card(<>
              {sec("HOW TO GET IT")}
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { step: "1", text: "Download Claude Desktop from claude.ai/download (macOS or Windows)" },
                  { step: "2", text: "Sign in with your Anthropic account — requires a paid plan (Pro, Max, Teams, or Enterprise)" },
                  { step: "3", text: "Click the Cowork tab. On macOS, Apple Silicon (M1+) is required — Intel Macs don't get the Cowork tab." },
                  { step: "4", text: "Install plugins from claude.com/plugins to unlock role-specific workflows" },
                ].map((s, i) => (
                  <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <div style={{ background: ACCENT, borderRadius: "50%", minWidth: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: "clamp(11px, 1vw, 13px)", flexShrink: 0 }}>{s.step}</div>
                    <span style={{ color: TEXT, fontSize: "clamp(12px, 1.1vw, 15px)", lineHeight: 1.5 }}>{s.text}</span>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 12, padding: "8px 12px", background: "#D9770611", border: `1px solid ${ACCENT}44`, borderRadius: 8, fontSize: "clamp(11px, 1vw, 13px)", color: ACCENT }}>
                ⚠️ Research preview — agent safety is still in active development.
              </div>
            </>)}

            {/* How it works */}
            {card(<>
              {sec("HOW IT WORKS")}
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[
                  { icon: "🎯", title: "Set a goal", body: "Describe what you want accomplished — as a task, a recurring schedule, or an outcome. No need to specify steps." },
                  { icon: "☁️", title: "Claude works in a cloud VM", body: "It runs independently in its own environment, using tools and plugins to complete the task. You can continue working." },
                  { icon: "📬", title: "Stay informed", body: "Cowork surfaces progress updates and asks for input only when it genuinely needs a decision from you." },
                  { icon: "🔌", title: "Extend with plugins", body: "Plugins connect Cowork to Slack, Notion, Jira, HubSpot, Snowflake, BigQuery, GitHub, Linear, and more via MCP." },
                ].map((item, i) => (
                  <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <span style={{ fontSize: "clamp(16px, 1.5vw, 22px)", flexShrink: 0 }}>{item.icon}</span>
                    <div>
                      <div style={{ color: ACCENT, fontWeight: 700, fontSize: "clamp(12px, 1.1vw, 15px)", marginBottom: 2 }}>{item.title}</div>
                      <div style={{ color: TEXT, fontSize: "clamp(12px, 1vw, 14px)", lineHeight: 1.5 }}>{item.body}</div>
                    </div>
                  </div>
                ))}
              </div>
            </>)}
          </div>

          {/* Cowork vs Code */}
          {card(<>
            {sec("COWORK vs CLAUDE CODE")}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr 2fr", gap: "clamp(6px, 0.7vw, 10px)" }}>
              <div style={{ color: MUTED, fontSize: "clamp(11px, 1vw, 13px)", fontWeight: 700 }}></div>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: "clamp(12px, 1.1vw, 15px)", marginBottom: 6 }}>Claude Code</div>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: "clamp(12px, 1.1vw, 15px)", marginBottom: 6 }}>Claude Cowork</div>
              {vs.map((row, i) => (<React.Fragment key={i}>
                <div style={{ color: MUTED, fontSize: "clamp(11px, 0.95vw, 13px)", fontWeight: 700, paddingTop: 4 }}>{row.label}</div>
                <div style={{ color: TEXT, fontSize: "clamp(11px, 1vw, 13px)", lineHeight: 1.4, borderLeft: `2px solid ${BORDER}`, paddingLeft: 10 }}>{row.code}</div>
                <div style={{ color: TEXT, fontSize: "clamp(11px, 1vw, 13px)", lineHeight: 1.4, borderLeft: `2px solid ${ACCENT}44`, paddingLeft: 10 }}>{row.work}</div>
              </React.Fragment>))}
            </div>
          </>, { marginBottom: "clamp(10px, 1vw, 16px)" })}

          {/* Plugins */}
          {card(<>
            {sec("OFFICIAL KNOWLEDGE WORK PLUGINS  —  github.com/anthropics/knowledge-work-plugins")}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "clamp(6px, 0.7vw, 10px)" }}>
              {plugins.map((p, i) => (
                <div key={i} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, padding: "clamp(8px, 0.9vw, 12px)" }}>
                  <div style={{ fontSize: "clamp(16px, 1.5vw, 22px)", marginBottom: 4 }}>{p.icon}</div>
                  <div style={{ color: "#fff", fontWeight: 700, fontSize: "clamp(12px, 1.1vw, 14px)", marginBottom: 3 }}>{p.label}</div>
                  <div style={{ color: MUTED, fontSize: "clamp(10px, 0.9vw, 13px)", lineHeight: 1.4 }}>{p.desc}</div>
                </div>
              ))}
            </div>
          </>)}
        </div>
      );
    }

    // ─── Main App ──────────────────────────────────────────────────────────────

    function App() {
      const [view, setView] = useState("slides");
      const [cur, setCur] = useState(0);
      const total = slides.length;
      const slide = slides[cur];

      const go = (d) => setCur((c) => Math.max(0, Math.min(total - 1, c + d)));

      useEffect(() => {
        const handler = (e) => {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") {
            if (view === "slides") go(1);
            else setView("slides");
          }
          if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
            if (view === "slides") go(-1);
          }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [view, cur]);

      const tabStyle = (active) => ({
        background: active ? ACCENT : BORDER,
        border: "none",
        borderRadius: 8,
        padding: "clamp(6px, 0.6vw, 9px) clamp(16px, 1.6vw, 24px)",
        cursor: "pointer",
        color: active ? "#fff" : MUTED,
        fontSize: "clamp(12px, 1.1vw, 15px)",
        fontWeight: 700,
      });

      return (
        <div style={{
          background: BG,
          minHeight: "100vh",
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "flex-start",
          fontFamily: "'Segoe UI', system-ui, sans-serif",
          padding: "clamp(16px, 2vw, 28px) clamp(12px, 2vw, 24px)",
        }}>
          {/* Top bar: view tabs + slide nav */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, width: "100%", maxWidth: "min(95vw, 1200px)", justifyContent: "space-between", flexWrap: "wrap" }}>
            {/* View tabs */}
            <div style={{ display: "flex", gap: 8 }}>
              <button style={tabStyle(view === "slides")} onClick={() => setView("slides")}>Code</button>
              <button style={tabStyle(view === "cowork")} onClick={() => setView("cowork")}>Cowork</button>
              <button style={tabStyle(view === "resources")} onClick={() => setView("resources")}>Resources</button>
            </div>

            {/* Slide nav dots (only in slides view) */}
            {view === "slides" && (
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap", justifyContent: "flex-end", flex: 1, marginLeft: 12 }}>
                {slides.map((s, i) => (
                  <button key={i} onClick={() => setCur(i)} style={{
                    background: i === cur ? ACCENT : BORDER,
                    border: "none",
                    borderRadius: 10,
                    padding: "clamp(3px, 0.4vw, 6px) clamp(8px, 0.9vw, 13px)",
                    cursor: "pointer",
                    color: i === cur ? "#fff" : MUTED,
                    fontSize: "clamp(10px, 0.9vw, 13px)",
                    fontWeight: 600,
                  }}>
                    {s.label}
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Content area */}
          {view === "resources" ? (
            <ResourcesView />
          ) : view === "cowork" ? (
            <CoworkView />
          ) : (
            <>
              <div style={{ position: "relative", width: "100%", maxWidth: "min(95vw, 1200px)" }}>
                {slide.type === "title" && <TitleBackground />}
                <div style={{
                  position: "relative",
                  background: slide.type === "title" ? "transparent" : CARD,
                  border: `1px solid ${BORDER}`,
                  borderRadius: 16,
                  width: "100%",
                  minHeight: "clamp(480px, calc(100vh - 180px), 900px)",
                  padding: "clamp(28px, 3vw, 52px) clamp(28px, 4vw, 64px)",
                  display: "flex",
                  flexDirection: "column",
                  justifyContent: "center",
                  boxShadow: "0 4px 40px rgba(0,0,0,0.4)",
                  overflow: "hidden",
                }}>
                  <SlideContent slide={slide} />
                </div>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 28, marginTop: 16 }}>
                <button onClick={() => go(-1)} disabled={cur === 0} style={{
                  background: cur === 0 ? BORDER : ACCENT,
                  border: "none",
                  borderRadius: 8,
                  padding: "clamp(8px, 0.9vw, 12px) clamp(20px, 2vw, 32px)",
                  color: "#fff",
                  cursor: cur === 0 ? "default" : "pointer",
                  fontWeight: 700,
                  fontSize: "clamp(13px, 1.2vw, 16px)",
                  opacity: cur === 0 ? 0.4 : 1,
                }}>
                  ← Prev
                </button>
                <span style={{ color: MUTED, fontSize: "clamp(12px, 1.1vw, 15px)" }}>{cur + 1} / {total}</span>
                <button onClick={() => go(1)} disabled={cur === total - 1} style={{
                  background: cur === total - 1 ? BORDER : ACCENT,
                  border: "none",
                  borderRadius: 8,
                  padding: "clamp(8px, 0.9vw, 12px) clamp(20px, 2vw, 32px)",
                  color: "#fff",
                  cursor: cur === total - 1 ? "default" : "pointer",
                  fontWeight: 700,
                  fontSize: "clamp(13px, 1.2vw, 16px)",
                  opacity: cur === total - 1 ? 0.4 : 1,
                }}>
                  Next →
                </button>
              </div>
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
